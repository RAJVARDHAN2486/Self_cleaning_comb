<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC-200 V4.2: Spring-Loaded Release</title>
    <style>
        body {
            background-color: #0b0d14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #13151f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid #2d3142;
            width: 900px;
        }
        .header-text {
            font-family: 'Arial Black', Impact, sans-serif;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #2d3142;
            padding-bottom: 15px;
        }
        .title { color: #fff; font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        .subtitle { color: #8a93a6; font-size: 13px; margin: 4px 0 0 0; font-family: monospace; }
        .tech-spec { color: #ff3333; font-size: 12px; font-family: monospace; font-weight: bold; text-align: right;}
        
        .controls {
            margin-top: 20px;
            padding: 20px;
            background-color: #0b0d14;
            border-radius: 8px;
            border: 1px solid #2d3142;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .fire-btn {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
            transition: all 0.1s;
        }
        .fire-btn:active { transform: scale(0.95); }
        .fire-btn:disabled { background-color: #555; box-shadow: none; cursor: not-allowed; color: #888;}

        .slider-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #00e5ff;
            margin-top: 8px;
        }
        .label { font-size: 13px; color: #8a93a6; font-weight: bold; letter-spacing: 1px; display: flex; justify-content: space-between; }
        
        svg { background-color: #0e1017; border-radius: 6px; border: 1px solid #1f2335; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-text">
        <div>
            <p class="title">SC-200 // SPRING-LOADED MECHANISM (V4.2)</p>
            <p class="subtitle">PUSH-TO-RELEASE LATCH WITH MANUAL RESET</p>
        </div>
        <div class="tech-spec">
            <p style="margin: 0; color: #00e5ff;">ASYMMETRIC FLUSH SCRAPERS</p>
            <p style="margin: 4px 0 0 0; color: #ff3333;">POWER SPRING EJECTION</p>
        </div>
    </div>
    
    <svg width="850" height="420" viewBox="0 0 850 420">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c1f2e" stroke-width="1"/>
            </pattern>
            <filter id="glow-cyan">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <path d="M 70 140 L 200 140 L 250 90 L 780 90 L 780 230 L 250 230 L 200 250 L 70 250 L 50 230 L 50 160 Z" fill="#1b1e2e" stroke="#383e59" stroke-width="2" stroke-linejoin="round"/>
        
        <rect x="80" y="150" width="12" height="90" rx="4" fill="#0b0d14" stroke="#383e59" stroke-width="1"/>
        <rect x="110" y="150" width="12" height="90" rx="4" fill="#0b0d14" stroke="#383e59" stroke-width="1"/>
        <rect x="140" y="150" width="12" height="90" rx="4" fill="#0b0d14" stroke="#383e59" stroke-width="1"/>
        <rect x="170" y="150" width="12" height="90" rx="4" fill="#0b0d14" stroke="#383e59" stroke-width="1"/>

        <rect x="260" y="100" width="500" height="120" fill="#0b0d14" stroke="#13151f" stroke-width="2"/>
        
        <rect x="340" y="100" width="40" height="10" fill="#383e59"/>
        <rect x="500" y="100" width="40" height="10" fill="#383e59"/>
        <rect x="660" y="100" width="40" height="10" fill="#383e59"/>

        <path id="spring1" fill="none" stroke="#8a93a6" stroke-width="4" stroke-linejoin="round"/>
        <path id="spring2" fill="none" stroke="#8a93a6" stroke-width="4" stroke-linejoin="round"/>
        <path id="spring3" fill="none" stroke="#8a93a6" stroke-width="4" stroke-linejoin="round"/>

        <g id="latch-assembly">
            <rect x="235" y="115" width="40" height="15" fill="#ff3333" stroke="#aa0000" stroke-width="2"/>
            <polygon points="275,115 285,115 285,130 265,130" fill="#ff3333" stroke="#aa0000" stroke-width="2"/>
            <text x="210" y="110" fill="#ff3333" font-size="10" font-family="monospace">LOCK LATCH</text>
        </g>

        <g id="driven-plate" transform="translate(0, 0)">
            <rect x="260" y="125" width="490" height="15" rx="2" fill="#00e5ff" filter="url(#glow-cyan)"/>
            <rect x="260" y="120" width="10" height="5" fill="#ffffff"/>

            <g fill="#00e5ff">
                <rect x="264" y="140" width="4" height="90" rx="1" />
                <rect x="324" y="140" width="4" height="90" rx="1" />
                <rect x="384" y="140" width="4" height="90" rx="1" />
                <rect x="444" y="140" width="4" height="90" rx="1" />
                <rect x="504" y="140" width="4" height="90" rx="1" />
                <rect x="564" y="140" width="4" height="90" rx="1" />
                <rect x="624" y="140" width="4" height="90" rx="1" />
                <rect x="684" y="140" width="4" height="90" rx="1" />
            </g>
        </g>

        <rect x="250" y="230" width="520" height="5" fill="#383e59"/>
        <g fill="#1b1e2e" stroke="#383e59" stroke-width="1.5">
            <rect x="258" y="230" width="6" height="80" rx="1"/>
            <rect x="318" y="230" width="6" height="80" rx="1"/>
            <rect x="378" y="230" width="6" height="80" rx="1"/>
            <rect x="438" y="230" width="6" height="80" rx="1"/>
            <rect x="498" y="230" width="6" height="80" rx="1"/>
            <rect x="558" y="230" width="6" height="80" rx="1"/>
            <rect x="618" y="230" width="6" height="80" rx="1"/>
            <rect x="678" y="230" width="6" height="80" rx="1"/>
            <rect x="738" y="230" width="6" height="80" rx="1"/>
        </g>

        <text id="statusText" x="430" y="50" fill="#ff3333" font-size="18" font-family="'Arial Black', sans-serif" letter-spacing="2">SYSTEM LOCKED AND LOADED</text>
    </svg>

    <div class="controls">
        <button id="fireBtn" class="fire-btn">FIRE TRIGGER</button>
        
        <div class="slider-wrapper">
            <div class="label">
                <span>MANUAL RESET (PUSH BACK UP)</span>
                <span id="lockStatus" style="color: #00e5ff;">LOCKED</span>
            </div>
            <input type="range" id="resetSlider" min="0" max="80" step="1" value="80" disabled>
        </div>
    </div>
</div>

<script>
    const fireBtn = document.getElementById('fireBtn');
    const resetSlider = document.getElementById('resetSlider');
    const drivenPlate = document.getElementById('driven-plate');
    const latchAssembly = document.getElementById('latch-assembly');
    const statusText = document.getElementById('statusText');
    const lockStatus = document.getElementById('lockStatus');
    
    const spring1 = document.getElementById('spring1');
    const spring2 = document.getElementById('spring2');
    const spring3 = document.getElementById('spring3');

    let isLocked = true;
    let currentY = 0;

    function drawSprings(yTravel) {
        const topY = 110;
        const bottomY = 125 + yTravel;
        const height = bottomY - topY;
        const segment = height / 6;

        function getSpringPath(x) {
            return `M ${x} ${topY} 
                    L ${x-10} ${topY + segment*1} 
                    L ${x+10} ${topY + segment*2} 
                    L ${x-10} ${topY + segment*3} 
                    L ${x+10} ${topY + segment*4} 
                    L ${x-10} ${topY + segment*5} 
                    L ${x} ${bottomY}`;
        }

        spring1.setAttribute('d', getSpringPath(360));
        spring2.setAttribute('d', getSpringPath(520));
        spring3.setAttribute('d', getSpringPath(680));
    }

    drawSprings(0);

    fireBtn.addEventListener('click', () => {
        if (!isLocked) return;
        
        latchAssembly.setAttribute('transform', 'translate(-15, 0)');
        
        let startTime = null;
        const duration = 100;
        
        function snapAnimation(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = (timestamp - startTime) / duration;
            
            if (progress < 1) {
                currentY = 80 * Math.min(progress, 1); 
                updateSystemVisuals(currentY);
                requestAnimationFrame(snapAnimation);
            } else {
                currentY = 80;
                updateSystemVisuals(currentY);
                
                isLocked = false;
                fireBtn.disabled = true;
                resetSlider.disabled = false;
                resetSlider.value = 0;
                
                statusText.textContent = "SYSTEM DEPLOYED - NEEDS MANUAL RESET";
                statusText.setAttribute('fill', '#8a93a6');
                lockStatus.textContent = "UNLOCKED";
                lockStatus.style.color = "#ff3333";
            }
        }
        requestAnimationFrame(snapAnimation);
    });

    resetSlider.addEventListener('input', function() {
        if (isLocked) return;
        
        currentY = 80 - parseInt(this.value);
        updateSystemVisuals(currentY);
        
        if (currentY === 0) {
            isLocked = true;
            latchAssembly.setAttribute('transform', 'translate(0, 0)');
            
            fireBtn.disabled = false;
            resetSlider.disabled = true;
            
            statusText.textContent = "SYSTEM LOCKED AND LOADED";
            statusText.setAttribute('fill', '#ff3333');
            lockStatus.textContent = "LOCKED";
            lockStatus.style.color = "#00e5ff";
        }
    });

    function updateSystemVisuals(yPos) {
        drivenPlate.setAttribute('transform', `translate(0, ${yPos})`);
        drawSprings(yPos);
    }
</script>

</body>
</html>
